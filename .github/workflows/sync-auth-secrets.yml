name: Sync Auth Secrets
run-name: "Sync auth secrets to ${{ inputs.environment }} by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to sync secrets to"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  sync:
    name: Sync secrets (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate all required secrets are present
        env:
          AWS_SES_ACCESS_KEY: ${{ secrets.AWS_SES_ACCESS_KEY }}
          AWS_SES_SECRET_KEY: ${{ secrets.AWS_SES_SECRET_KEY }}
          AWS_SES_REGION: ${{ secrets.AWS_SES_REGION }}
        run: |
          missing=()

          if ! aws ssm get-parameter \
              --name "/${{ vars.PROJECT_NAME }}/${{ inputs.environment }}/auth/better-auth-secrets" \
              --with-decryption \
              --region "$AWS_REGION" >/dev/null 2>&1; then
            missing+=("SSM: /${{ vars.PROJECT_NAME }}/${{ inputs.environment }}/auth/better-auth-secrets")
          fi

          [ -z "$AWS_SES_ACCESS_KEY" ] && missing+=("GitHub Secret: AWS_SES_ACCESS_KEY")
          [ -z "$AWS_SES_SECRET_KEY" ] && missing+=("GitHub Secret: AWS_SES_SECRET_KEY")
          [ -z "$AWS_SES_REGION" ]     && missing+=("GitHub Secret: AWS_SES_REGION")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets for ${{ inputs.environment }}:"
            for m in "${missing[@]}"; do
              echo "::error::  - $m"
            done
            exit 1
          fi

          echo "All required secrets present."

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --legacy-peer-deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'

      - name: Sync BETTER_AUTH_SECRETS
        working-directory: services/auth
        run: |
          set -o pipefail
          aws ssm get-parameter \
            --name "/${{ vars.PROJECT_NAME }}/${{ inputs.environment }}/auth/better-auth-secrets" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
          | npx wrangler secret put BETTER_AUTH_SECRETS -e ${{ inputs.environment }}

      - name: Sync AWS_SES_ACCESS_KEY
        working-directory: services/auth
        env:
          AWS_SES_ACCESS_KEY: ${{ secrets.AWS_SES_ACCESS_KEY }}
        run: echo "$AWS_SES_ACCESS_KEY" | npx wrangler secret put AWS_SES_ACCESS_KEY -e ${{ inputs.environment }}

      - name: Sync AWS_SES_SECRET_KEY
        working-directory: services/auth
        env:
          AWS_SES_SECRET_KEY: ${{ secrets.AWS_SES_SECRET_KEY }}
        run: echo "$AWS_SES_SECRET_KEY" | npx wrangler secret put AWS_SES_SECRET_KEY -e ${{ inputs.environment }}

      - name: Sync AWS_SES_REGION
        working-directory: services/auth
        env:
          AWS_SES_REGION: ${{ secrets.AWS_SES_REGION }}
        run: echo "$AWS_SES_REGION" | npx wrangler secret put AWS_SES_REGION -e ${{ inputs.environment }}
