name: Sync Auth Secrets
run-name: "Sync auth secrets to ${{ inputs.environment }} by @${{ github.actor }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to sync secrets to"
        required: true
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  sync:
    name: Sync secrets (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --legacy-peer-deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'

      - name: Sync BETTER_AUTH_SECRETS
        working-directory: services/auth
        run: |
          aws ssm get-parameter \
            --name "/${{ inputs.environment }}/auth/better-auth-secrets" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
          | npx wrangler secret put BETTER_AUTH_SECRETS -e ${{ inputs.environment }}

      - name: Sync AWS_SES_ACCESS_KEY
        working-directory: services/auth
        run: |
          value=$(aws ssm get-parameter \
            --name "/${{ inputs.environment }}/auth/aws-ses-access-key" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text 2>/dev/null) || { echo "AWS_SES_ACCESS_KEY not found in SSM — skipping"; exit 0; }
          echo "$value" | npx wrangler secret put AWS_SES_ACCESS_KEY -e ${{ inputs.environment }}

      - name: Sync AWS_SES_SECRET_KEY
        working-directory: services/auth
        run: |
          value=$(aws ssm get-parameter \
            --name "/${{ inputs.environment }}/auth/aws-ses-secret-key" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text 2>/dev/null) || { echo "AWS_SES_SECRET_KEY not found in SSM — skipping"; exit 0; }
          echo "$value" | npx wrangler secret put AWS_SES_SECRET_KEY -e ${{ inputs.environment }}

      - name: Sync AWS_SES_REGION
        working-directory: services/auth
        run: |
          value=$(aws ssm get-parameter \
            --name "/${{ inputs.environment }}/auth/aws-ses-region" \
            --query "Parameter.Value" \
            --output text 2>/dev/null) || { echo "AWS_SES_REGION not found in SSM — skipping"; exit 0; }
          echo "$value" | npx wrangler secret put AWS_SES_REGION -e ${{ inputs.environment }}
