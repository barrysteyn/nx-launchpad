name: Cloudflare Preview Deploy

on:
  pull_request:
    branches: [main]

concurrency:
  group: preview-deploy-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NX_DAEMON: "false"
  NX_NO_CLOUD: "true"
  NX_SKIP_NX_CACHE: "false"

jobs:
  deploy:
    name: Deploy previews
    runs-on: ubuntu-latest
    environment: staging
    env:
      APP_ENV: staging
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --legacy-peer-deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'

      - uses: nrwl/nx-set-shas@v4

      - name: Deploy all affected Cloudflare apps
        id: deploy
        run: |
          set -euo pipefail

          npx nx affected -t deploy --configuration=preview 2>&1 | tee deploy-output.txt

          # Strip ANSI escape codes so regexes match reliably
          sed 's/\x1b\[[0-9;]*m//g' deploy-output.txt > deploy-clean.txt

          # Extract project names paired with their version-specific preview URLs
          COMMENT_BODY=$(awk '
            match($0, /nx run ([^:]+):deploy/, a) { proj = a[1] }
            match($0, /PREVIEW_URL=(https:\/\/[a-f0-9][^ ]+)/, u) {
              if (proj != "") { print "- **" proj "**: " u[1]; proj = "" }
            }
          ' deploy-clean.txt)

          if [ -z "$COMMENT_BODY" ]; then
            COMMENT_BODY="_No preview URLs captured._"
          fi

          {
            echo "comment_body<<EOF"
            echo "$COMMENT_BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment PR with preview URLs
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deploy
          message: |
            ## 🚀 Preview Deployments

            ${{ steps.deploy.outputs.comment_body }}
