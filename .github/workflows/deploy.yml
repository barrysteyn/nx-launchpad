name: Deploy
run-name: "Deploy to ${{ github.event.inputs.environment || (github.ref == 'refs/heads/production' && 'production' || 'staging') }} [${{ github.event.inputs.app || 'all affected' }}] by @${{ github.actor }}"

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - staging
          - production
      app:
        description: "App to deploy (leave blank to deploy all affected apps)"
        required: false
        type: string

permissions:
  contents: read
  actions: read

env:
  NX_DAEMON: "false"
  NX_SKIP_NX_CACHE: "false"
  AWS_REGION: us-east-1

jobs:
  plan:
    name: Plan deploy targets
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      environment: ${{ steps.config.outputs.environment }}
      count: ${{ steps.affected.outputs.count }}
      needs_python_uv: ${{ steps.affected.outputs.needs_python_uv }}
      needs_java: ${{ steps.affected.outputs.needs_java }}
      summary_md: ${{ steps.affected.outputs.summary_md }}
      config_affected: ${{ steps.config_affected.outputs.affected }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --legacy-peer-deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'

      - uses: nrwl/nx-set-shas@v4

      - name: Check if config is affected
        id: config_affected
        run: |
          if npx nx show projects --affected --json | jq -e 'contains(["config"])' > /dev/null 2>&1; then
            echo "affected=true" >> $GITHUB_OUTPUT
          else
            echo "affected=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine deploy environment
        id: config
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Determine nx command
        id: nx_cmd
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.app }}" ]]; then
            echo "command=printf '[\"${{ github.event.inputs.app }}\"]'" >> $GITHUB_OUTPUT
          else
            echo "command=npx nx show projects --affected --json" >> $GITHUB_OUTPUT
          fi

      - name: Compute deploy targets
        id: affected
        uses: ./.github/actions/nx-affected
        with:
          nx_command: ${{ steps.nx_cmd.outputs.command }}
          summary_title: "## 🚀 Nx deploy targets"

  find-pr:
    name: Find originating PR
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      pr: ${{ steps.from_commit.outputs.pr }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Look up PR from merge commit
        id: from_commit
        uses: jwalton/gh-find-current-pr@v1
        with:
          state: closed

  post-placeholder:
    name: Post placeholder comment to PR
    needs: find-pr
    if: needs.find-pr.outputs.pr != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ needs.find-pr.outputs.pr }}
          header: post-merge-results
          only_create: true
          message: |
            ## 🚀 Post Merge Results

            ⏳ Deploying to staging — this comment will update when the deploy finishes.

            [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  deploy:
    name: deploy (${{ needs.plan.outputs.environment }})
    needs: plan
    if: needs.plan.outputs.count != '0'
    runs-on: ubuntu-latest
    environment: ${{ needs.plan.outputs.environment }}
    env:
      ENVIRONMENT: ${{ needs.plan.outputs.environment }}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      PROJECT_NAME: ${{ vars.PROJECT_NAME }}
      URL: ${{ vars.URL }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Print deploy summary
        run: |
          echo "## 🚀 Deploy Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Variable | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`$ENVIRONMENT\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Project name | \`$PROJECT_NAME\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Config affected | \`${{ needs.plan.outputs.config_affected }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Apps to deploy | \`${{ needs.plan.outputs.count }}\` |" >> $GITHUB_STEP_SUMMARY

      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --legacy-peer-deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'

      - uses: nrwl/nx-set-shas@v4

      - name: Set up Java
        if: needs.plan.outputs.needs_java == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Python and uv
        if: needs.plan.outputs.needs_python_uv == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Deploy config
        if: needs.plan.outputs.config_affected == 'true' || (github.event_name == 'workflow_dispatch' && github.event.inputs.app == 'config')
        timeout-minutes: 15
        uses: ./.github/actions/nx-run-and-record
        with:
          projects: '["config"]'
          target: deploy-config
          configuration: ${{ needs.plan.outputs.environment }}

      - name: Deploy single app
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.app != '' && github.event.inputs.app != 'config'
        timeout-minutes: 30
        uses: ./.github/actions/nx-run-and-record
        with:
          projects: '["${{ github.event.inputs.app }}"]'
          target: deploy
          configuration: ${{ needs.plan.outputs.environment }}

      - name: Deploy all affected
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.app == ''
        timeout-minutes: 30
        uses: ./.github/actions/nx-run-and-record
        with:
          target: deploy
          configuration: ${{ needs.plan.outputs.environment }}

      - name: Upload deploy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-results
          path: deploy-results/
          if-no-files-found: ignore

  post-results:
    name: Post final results to PR
    needs: [find-pr, post-placeholder, deploy]
    if: always() && needs.find-pr.outputs.pr != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read
    steps:
      - name: Download deploy results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: deploy-results
          path: deploy-results/
      - name: Compose comment body
        id: compose
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_LINK="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          RUN_LINK="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          SUCCEEDED=0
          FAILED=0
          for f in deploy-results/*.json; do
            [ -f "$f" ] || continue
            if [ "$(jq -r '.status' "$f")" = "success" ]; then
              SUCCEEDED=$((SUCCEEDED+1))
            else
              FAILED=$((FAILED+1))
            fi
          done
          TOTAL=$((SUCCEEDED + FAILED))

          if [ "$TOTAL" -eq 0 ]; then
            HEADLINE="_No projects were deployed in this run._"
          elif [ "$FAILED" -eq 0 ]; then
            HEADLINE="✅ **All ${TOTAL} deploys succeeded**"
          elif [ "$SUCCEEDED" -eq 0 ]; then
            HEADLINE="❌ **All ${TOTAL} deploys failed**"
          else
            HEADLINE="❌ **${FAILED} failed** · ✅ **${SUCCEEDED} succeeded**"
          fi

          {
            echo 'body<<COMMENT_EOF'
            echo '## 🚀 Post Merge Results'
            echo
            echo "${HEADLINE} · staging · [\`${SHORT_SHA}\`](${COMMIT_LINK}) · [Workflow run](${RUN_LINK})"
            if [ "$TOTAL" -gt 0 ]; then
              echo
              echo '| Project | Target | Status |'
              echo '|---|---|---|'
              for f in deploy-results/*.json; do
                [ -f "$f" ] || continue
                jq -r '"| \(.project) | \(.target) | \(if .status == "success" then "✅" else "❌" end) \(.status) |"' "$f"
              done
            fi
            echo COMMENT_EOF
          } >> "$GITHUB_OUTPUT"
      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          number: ${{ needs.find-pr.outputs.pr }}
          header: post-merge-results
          message: ${{ steps.compose.outputs.body }}
