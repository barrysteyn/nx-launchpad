name: Deploy
run-name: "Deploy to ${{ github.event.inputs.environment || (github.ref == 'refs/heads/production' && 'production' || 'staging') }} [${{ github.event.inputs.app || 'all affected' }}] by @${{ github.actor }}"

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - staging
          - production
      app:
        description: "App to deploy (leave blank to deploy all affected apps)"
        required: false
        type: string

permissions:
  contents: read
  actions: read

env:
  NX_DAEMON: "false"
  NX_SKIP_NX_CACHE: "false"
  AWS_REGION: us-east-1

jobs:
  plan:
    name: Plan deploy targets
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    outputs:
      configuration: ${{ steps.config.outputs.configuration }}
      count: ${{ steps.affected.outputs.count }}
      needs_python_uv: ${{ steps.affected.outputs.needs_python_uv }}
      needs_java: ${{ steps.affected.outputs.needs_java }}
      summary_md: ${{ steps.affected.outputs.summary_md }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --legacy-peer-deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'

      - uses: nrwl/nx-set-shas@v4

      - name: Determine deploy configuration
        id: config
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "configuration=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/production" ]]; then
            echo "configuration=production" >> $GITHUB_OUTPUT
          else
            echo "configuration=staging" >> $GITHUB_OUTPUT
          fi

      - name: Determine nx command
        id: nx_cmd
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.app }}" ]]; then
            echo "command=printf '[\"${{ github.event.inputs.app }}\"]'" >> $GITHUB_OUTPUT
          else
            echo "command=npx nx show projects --affected --json" >> $GITHUB_OUTPUT
          fi

      - name: Compute deploy targets
        id: affected
        uses: ./.github/actions/nx-affected
        with:
          nx_command: ${{ steps.nx_cmd.outputs.command }}
          summary_title: "## 🚀 Nx deploy targets"

  deploy:
    name: deploy (${{ needs.plan.outputs.configuration }})
    needs: plan
    if: needs.plan.outputs.count != '0'
    runs-on: ubuntu-latest
    environment: ${{ needs.plan.outputs.configuration }}
    env:
      APP_ENV: ${{ needs.plan.outputs.configuration }}
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      - run: npm ci --legacy-peer-deps
        if: steps.cache-node-modules.outputs.cache-hit != 'true'

      - uses: nrwl/nx-set-shas@v4

      - name: Set up Java
        if: needs.plan.outputs.needs_java == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Python and uv
        if: needs.plan.outputs.needs_python_uv == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Deploy single app
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.app != ''
        timeout-minutes: 30
        run: npx nx run ${{ github.event.inputs.app }}:deploy --configuration=${{ needs.plan.outputs.configuration }}

      - name: Deploy all affected
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.app == ''
        timeout-minutes: 30
        run: npx nx affected run-many -t deploy --configuration=${{ needs.plan.outputs.configuration }}
